{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskAI | Login</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="auth-body">
<section class="auth-card panel">
    <p class="eyebrow">Secure access</p>
    <h1>Welcome back</h1>
    <p class="auth-subtitle">Sign in to continue your risk analysis workflow.</p>

    {% if error %}
    <p class="form-error">{{ error }}</p>
    {% endif %}

    <form method="POST" class="auth-form">
        {% csrf_token %}
        <label for="id_username">Username</label>
        <input id="id_username" type="text" name="username" placeholder="Username" required>

        <label for="id_password">Password</label>
        <input id="id_password" type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <p class="auth-link">New to RiskAI? <a href="/api/register/">Create an account</a></p>
</section>
</body>

</html>
